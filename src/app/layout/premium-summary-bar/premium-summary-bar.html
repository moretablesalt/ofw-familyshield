@let p = premium();

<div class="premium-summary">
  <div class="premium-content">

    <div class="premium-total">
      Total Premium P{{ p?.grossPremium }}
    </div>

    <a class="premium-link" (click)="openModal()">
      Premium Breakdown
    </a>

  </div>
</div>

<app-premium-breakdown-modal
  [visible]="showModal()"
  [grossUsd]="p?.grossPremium"
  [basicUsd]="p?.basicPremium"
  [dstUsd]="p?.dst"
  [premTaxUsd]="p?.premTax"
  [lgtUsd]="p?.lgt"
  (close)="closeModal()">
</app-premium-breakdown-modal>
